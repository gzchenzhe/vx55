    <style>

            font-family: "SF Pro";

            font-weight: 600;
            src: url("fonts/sf-pro-text_semibold.woff2") format("woff2");

            font-weight: 400;

        :root {
            --ios-font: "SF Pro", "PingFang SC", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            --wechat-green: #95ec69;
            --wechat-green-dark: #07c160;
            --wechat-bg-light: #ededed;
            --wechat-bg-dark: #111111;
            --wechat-bar-light: #ededed;
            --wechat-bar-dark: #111111;
            --wechat-left-light: #ffffff;
            --wechat-left-dark: #2c2c2e;
            --wechat-text: #191919;
        }

        * { letter-spacing: 0; }

        body {
            font-family: var(--ios-font);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            background: #f5f5f7;
            color: #1f2329;
        }

        button, input, textarea, select {
            font-family: var(--ios-font);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #aeaeb2; }

        #app > div:first-child {
            border-radius: 18px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
        }

        #edit-panel-scroll input:not([type="checkbox"]),
        #edit-panel-scroll textarea,
        #edit-panel-scroll select {
            border: 0.5px solid #d1d1d6;
            border-radius: 9px;
            background: #ffffff;
            color: #111111;
            font-size: 15px;
            line-height: 20px;
            box-shadow: inset 0 0 0 0.5px rgba(255,255,255,0.4);
        }

        #edit-panel-scroll input:not([type="checkbox"]):focus,
        #edit-panel-scroll textarea:focus,
        #edit-panel-scroll select:focus {
            border-color: #07c160;
            box-shadow: 0 0 0 3px rgba(7, 193, 96, 0.14);
        }

        .pwa-select-wrap {
            position: relative;
        }

        select.pwa-native-select {
            -webkit-appearance: none !important;
            appearance: none !important;
            height: 42px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            background-color: #ffffff !important;
            background-image: none !important;
            color: #111111;
            font-size: 16px;
            line-height: 24px;
            padding-right: 40px;
        }

        .pwa-select-chevron {
            position: absolute;
            right: 12px;
            top: 50%;
            width: 16px;
            height: 16px;
            transform: translateY(-50%);
            pointer-events: none;
            color: #111111;
        }

        #edit-panel-scroll .bg-gray-50 {
            background-color: #f7f7f8 !important;
            border-color: #e5e5ea !important;
            border-radius: 12px !important;
        }

        #app button {
            border-radius: 10px;
            font-weight: 500;
            box-shadow: none !important;
        }

        #app > div:first-child > div:first-child button {
            height: 36px;
            padding-top: 0;
            padding-bottom: 0;
        }

        #app .grid.grid-cols-3 button {
            height: 36px;
            border: 0.5px solid #d1d1d6 !important;
            background: #ffffff !important;
            color: #111111 !important;
            font-size: 14px;
        }

        #app .grid.grid-cols-3 button:hover {
            background: #f2f2f7 !important;
        }

        #app .grid.grid-cols-3 button:last-child {
            background: #f7f7f8 !important;
        }

        .phone-shell {
            width: 391px;
            height: 828px;
            border: 8px solid #111113;
            border-radius: 46px;
            background: #111113;
            box-shadow: 0 24px 60px rgba(0,0,0,0.14), inset 0 0 0 1px rgba(255,255,255,0.08);
            box-sizing: border-box;
        }

        .wechat-screen {
            width: 375px;
            height: 812px;
            overflow: hidden;
            font-family: var(--ios-font);
            font-size: 17px;
            line-height: 1.35;
        }

        .wechat-status-bar {
            height: 44px;
            padding: 0;
            position: relative;
            flex-shrink: 0;
        }

        .wechat-status-left {
            position: absolute;
            left: 23px;
            top: 10px;
            width: 82px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wechat-status-left.no-return-app {
            top: 15px;
        }

        .wechat-status-left.has-return-app {
            top: 11px;
        }

        .wechat-status-time {
            font-family: "SF Pro", "Helvetica Neue", Arial, sans-serif;
            font-size: 17px;
            line-height: 22px;
            font-weight: 600;
            /*font-variant-numeric: tabular-nums;*/
        }

        .wechat-return-app {
            display: flex;
            align-items: center;
            position: absolute;
            left: -8px;
            top: 19px;
            height: 13px;
            font-size: 10.5px;
            line-height: 13px;
            font-weight: 500;
            color: currentColor;
            opacity: 1;
        }

        .wechat-return-triangle {
            width: 7px;
            height: 7px;
            margin-right: 3px;
            flex: 0 0 auto;
        }

        .wechat-status-right {
            position: absolute;
            right: 16px;
            top: 16px;
            width: 94px;
            display: flex;
            align-items: center;
            gap: 0;
        }

        .wechat-signal-icon {
            width: 20px;
            height: 14px;
        }

        .wechat-status-img {
            display: block;
            object-fit: contain;
            flex: 0 0 auto;
        }

        .wechat-status-img.theme-invert,
        .wechat-nav-img.theme-invert,
        .wechat-battery-png.theme-invert,
        .wechat-tool-image.theme-invert {
            filter: invert(1);
        }

        .wechat-signal-img {
            width: 20px;
            height: 14px;
        }

        .wechat-wifi-img {
            width: 25px;
            height: 19px;
            margin-left: 6px;
            margin-right: 0;
        }

        .wechat-network-label {
            /* 手动调整参数 3：5G/4G/3G 文字。
               margin-left 控制信号图标和文字的距离；width 是网络文字占位宽度，影响右侧电池位置；
               font-size 是文字大小；line-height 是文字盒子高度；font-weight 是粗细；
               transform 的 translateY 控制上下位置，scaleX 控制文字横向宽窄。 */
            margin-left: 5px;
            height: 14px;
            width: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: flex-start;
            font-family: "SF Pro", "Helvetica Neue", Arial, sans-serif;
            font-size: 16.5px;
            line-height: 16.5px;
            font-weight: 500;
            letter-spacing: 0;
            transform: translateY(0) scaleX(0.95);
            transform-origin: left center;
        }

        .wechat-battery-icon {
            width: 27px;
            height: 14px;
            margin-left: 5px;
            margin-right: 7px;
        }

        .wechat-battery-image-wrap {
            position: relative;
            width: 29px;
            height: 14px;
            margin-left: 5px;
            margin-right: 7px;
            flex: 0 0 auto;
        }

        .wechat-battery-fill {
            position: absolute;
            left: 2.7px;
            top: 2.7px;
            height: 8.55px;
            border-radius: 1.7px;
            background: currentColor;
            z-index: 1;
        }

        .wechat-battery-png {
            position: absolute;
            inset: 0;
            width: 29px;
            height: 14px;
            object-fit: contain;
            z-index: 2;
        }

        .wechat-nav-bar {
            height: 44px;
            padding: 0 12px;
            border-bottom-width: 0.5px;
            flex-shrink: 0;
        }

        .wechat-back-area {
            width: 104px;
            min-width: 104px;
            display: flex;
            align-items: center;
        }

        .wechat-back-icon {
            width: 24px;
            height: 30px;
            margin-left: -2px;
            stroke-width: 1.9;
        }

        .wechat-back-image {
            /* 手动调整参数 1：左上角微信返回箭头。
               width/height 控制箭头大小；margin-left 控制左右位置；
               transform: translateY(...) 控制箭头上下位置，正数向下，负数向上。 */
            width: 10px;
            height: 21px;
            margin-left: 0;
            object-fit: contain;
            transform: translateY(1px);
        }

        .wechat-unread-badge {
            /* 手动调整参数 2：未读信息气泡本体和数字。
               min-width 控制气泡最小宽度；height 控制气泡高度；padding 控制数字左右留白；
               border-radius 控制圆角；font-size 控制未读数字大小；line-height 通常跟 height 一致；
               transform: translateY(...) 控制气泡上下位置。 */
            min-width: 26px;
            height: 22px;
            padding: 0 7px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: "SF Pro", "Helvetica Neue", Arial, sans-serif;
            font-size: 14px;
            line-height: 22px;
            font-weight: 400;
            text-align: center;
            transform: translateY(1px);
        }

        .wechat-back-area .wechat-unread-badge {
            /* 手动调整参数 2：未读气泡和返回箭头之间的距离，数值越大气泡越靠右。 */
            margin-left: 6px;
        }

        .wechat-nav-title {
            /* 手动调整参数 5：聊天标题文字。
               font-size 控制标题大小；line-height 控制标题所在导航栏的垂直对齐；
               font-weight 控制粗细。 */
            font-size: 16px;
            line-height: 44px;
            font-weight: 500;
            -webkit-text-stroke: 0.18px currentColor;
            text-shadow: 0 0 0 currentColor;
            text-align: center;
            letter-spacing: 2px;
        }

        .wechat-nav-more {
            width: 104px;
            min-width: 104px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .wechat-more-image {
            /* 手动调整参数 4：右上角三个点图标。
               width/height 控制三点图标大小；margin-right 控制离手机右边的距离。 */
            width: 26px;
            height: 6px;
            margin-right: 1px;
            object-fit: contain;
        }

        .wechat-message-list {
            padding: 10px 10px 10px;
        }

        .wechat-time-label {
            font-size: 14px;
            line-height: 20px;
            font-weight: 400;
        }

        .wechat-nudge-label {
            font-size: 13px;
            line-height: 18px;
            font-weight: 400;
        }

        .wechat-message-row {
            gap: 10px;
            margin-bottom: 16px;
        }

        .wechat-bubble-stack {
            min-width: 0;
            max-width: calc(100% - 52px);
        }

        .wechat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 4px;
        }

        .wechat-nickname {
            font-size: 12px;
            line-height: 16px;
            margin: -2px 0 3px 1px;
        }

        /* 气泡小尾巴基础设定 */
        .bubble-tail::before {
            content: '';
            position: absolute;
            top: 13px;
            width: 7px;
            height: 10px;
            transform: none;
            border-radius: 0;
            z-index: 0;
        }
        
        /* 尾巴方向与颜色映射 */
        .bubble-left-dark::before { left: -5px; background-color: var(--wechat-left-dark); clip-path: polygon(100% 0, 0 50%, 100% 100%); }
        .bubble-right-dark::before { right: -5px; background-color: var(--wechat-green-dark); clip-path: polygon(0 0, 100% 50%, 0 100%); }
        .bubble-left-light::before { left: -5px; background-color: var(--wechat-left-light); clip-path: polygon(100% 0, 0 50%, 100% 100%); }
        .bubble-right-light::before { right: -5px; background-color: var(--wechat-green); clip-path: polygon(0 0, 100% 50%, 0 100%); }
        
        /* 转账尾巴映射 */
        .bubble-left-orange-pending-light::before, .bubble-left-orange-pending-dark::before { left: -5px; background-color: #f99d3b; clip-path: polygon(100% 0, 0 50%, 100% 100%); }
        .bubble-right-orange-pending-light::before, .bubble-right-orange-pending-dark::before  { right: -5px; background-color: #f99d3b; clip-path: polygon(0 0, 100% 50%, 0 100%); }
        .bubble-left-orange-accepted-dark::before, .bubble-left-orange-accepted-light::before { left: -5px; background-color: #fde1c2; clip-path: polygon(100% 0, 0 50%, 100% 100%); }
        .bubble-right-orange-accepted-dark::before, .bubble-right-orange-accepted-light::before { right: -5px; background-color: #fde1c2; clip-path: polygon(0 0, 100% 50%, 0 100%); }

        .bubble-left-redpacket-pending-light::before, .bubble-left-redpacket-pending-dark::before { left: -5px; background-color: #fa9e3b; clip-path: polygon(100% 0, 0 50%, 100% 100%); }
        .bubble-right-redpacket-pending-light::before, .bubble-right-redpacket-pending-dark::before { right: -5px; background-color: #fa9e3b; clip-path: polygon(0 0, 100% 50%, 0 100%); }
        .bubble-left-redpacket-accepted-light::before, .bubble-left-redpacket-accepted-dark::before { left: -5px; background-color: #fccd9f; clip-path: polygon(100% 0, 0 50%, 100% 100%); }
        .bubble-right-redpacket-accepted-light::before, .bubble-right-redpacket-accepted-dark::before { right: -5px; background-color: #fccd9f; clip-path: polygon(0 0, 100% 50%, 0 100%); }

        /* 文本气泡核心规范（V18 修复字间距与左右内边距） */
        .text-bubble {
            font-size: 16px;
            line-height: 20px;
            font-weight: 400;
            letter-spacing: 0.3px;
            padding: 9px 12px 9px;
            min-height: 40px;
            max-width: 255px;
            box-sizing: border-box;
            border-radius: 5px;
            overflow-wrap: anywhere;
            word-break: normal;
            white-space: pre-wrap;
            position: relative;
            z-index: 10;
            isolation: isolate;
        }
       
        .finance-bubble { width: 242px; border-radius: 5px; position: relative; z-index: 10; isolation: isolate; }
        .transfer-main {
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 65px;
            padding: 10px 12px 6px;
            position: relative;
            z-index: 10;
        }
        .transfer-amount {
            font-size: 16px;
            line-height: 20px;
            font-weight: 400;
            color: #ffffff;
            word-break: break-all;
        }
        .transfer-title {
            margin-top: 0;
            font-size: 15px;
            line-height: 19px;
            color: rgba(255, 255, 255, 0.9);
            word-break: break-all;
        }
        .transfer-title.is-accepted {
            color: rgba(255, 255, 255, 0.75);
        }
        .transfer-footer {
            padding: 0 12px 5px;
            font-size: 11px;
            line-height: 14px;
            color: rgba(255, 255, 255, 0.8);
            position: relative;
            z-index: 10;
        }
        .transfer-footer.is-accepted {
            color: rgba(255, 255, 255, 0.7);
        }
        .redpacket-bubble { width: 242px; border-radius: 5px; position: relative; z-index: 10; isolation: isolate; }
        .redpacket-main {
            display: flex;
            align-items: center;
            gap: 11px;
            min-height: 65px;
            padding: 12px 12px 6px;
            position: relative;
            z-index: 10;
        }
        .redpacket-title {
            font-size: 16px;
            line-height: 20px;
            font-weight: 400;
            color: #ffffff;
            word-break: break-all;
        }
        .redpacket-status {
            margin-top: 1px;
            font-size: 13px;
            line-height: 16px;
            color: rgba(255, 255, 255, 0.8);
            word-break: break-all;
        }
        .redpacket-footer {
            padding: 0 12px 5px;
            font-size: 12px;
            line-height: 16px;
            color: rgba(255, 255, 255, 0.8);
            position: relative;
            z-index: 10;
        }
        .image-bubble {
            width: 150px;
            height: 150px;
            max-width: none;
            max-height: none;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            z-index: 10;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .wechat-dark-bg { background-color: var(--wechat-bg-dark); }
        .wechat-dark-left { background-color: var(--wechat-left-dark); color: #f2f2f7; }
        .wechat-dark-right { background-color: var(--wechat-green-dark); color: #000000; }
        .transfer-pending { background-color: #f99d3b; color: #ffffff; }
        .transfer-accepted { background-color: #fde1c2; color: #ffffff; }
       
        /* 背景与字体颜色基准 */
        .wechat-dark-bg { background-color: var(--wechat-bg-dark); }
        .wechat-dark-left { background-color: var(--wechat-left-dark); color: #f2f2f7; }
        .wechat-dark-right { background-color: var(--wechat-green-dark); color: #000000; }
        
        .wechat-light-bg { background-color: var(--wechat-bg-light); }
        .wechat-light-left { background-color: var(--wechat-left-light); color: var(--wechat-text); }
        .wechat-light-right { background-color: var(--wechat-green); color: var(--wechat-text); }

        /* 转账气泡颜色规范 */
        .transfer-pending-light, .transfer-pending-dark { background-color: #f99d3b; color: #ffffff; }
        .transfer-accepted-dark, .transfer-accepted-light { background-color: #fde1c2; color: #ffffff; }
        .redpacket-pending-light, .redpacket-pending-dark { background-color: #fa9e3b; color: #ffffff; }
        .redpacket-accepted-light, .redpacket-accepted-dark { background-color: #fccd9f; color: #ffffff; }

        /* 浅色模式极度柔和弥散阴影 */
        .wechat-soft-shadow {
            box-shadow: none !important;
        }

        .wechat-light-left {
            box-shadow: 0 0 0 0.5px rgba(0,0,0,0.03);
        }

        .wechat-bottom-bar {
            min-height: 87px;
            padding: 10px 8px 25px 9px;
            border-top-width: 0.5px;
            position: relative;
            flex-shrink: 0;
        }

        .wechat-tool-icon {
            width: 29px;
            height: 29px;
            flex-shrink: 0;
        }

        .wechat-tool-image {
            width: 29px;
            height: 29px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .wechat-voice-wave {
            width: 14px;
            height: 20px;
            object-fit: contain;
            flex: 0 0 auto;
        }

        .wechat-voice-wave.is-dark:not(.is-me) {
            filter: invert(1) grayscale(1);
            opacity: 0.88;
        }

        .wechat-transfer-img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: contain;
            flex: 0 0 auto;
        }

        .wechat-redpacket-img {
            width: 40px;
            height: 47px;
            object-fit: contain;
            flex: 0 0 auto;
        }

        .wechat-voice-toggle {
            margin-right: 0;
        }

        .wechat-input-field {
            height: 36px;
            border-radius: 7px;
        }

        .wechat-mic-icon {
            position: absolute;
            right: 9px;
            top: 8px;
            width: 15px;
            height: 20px;
            color: rgba(0, 0, 0, 0.30);
        }

        .wechat-bottom-outline {
            stroke-width: 1.7;
        }

        .wechat-bottom-glyph {
            stroke-width: 1.75;
        }

        .wechat-home-indicator {
            position: absolute;
            left: 50%;
            bottom: 7px;
            width: 134px;
            height: 5px;
            border-radius: 999px;
            transform: translateX(-50%);
        }

        /* 拖拽动画 */
        .draggable-item { cursor: grab; transition: transform 0.2s, box-shadow 0.2s; }
        .draggable-item:active { cursor: grabbing; }
        .is-dragging { opacity: 0.4; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); transform: scale(1.02); z-index: 50; }
        .drag-over { border-top: 3px solid #3b82f6 !important; padding-top: 13px !important; }
        .msg-list-move, .msg-list-enter-active, .msg-list-leave-active { transition: all 0.4s cubic-bezier(0.4,0,0.2,1); }
        .msg-list-enter-from, .msg-list-leave-to { opacity: 0; transform: translateY(15px); }
        .msg-list-leave-active { position: absolute; width: 100%; }

        html,
        body {
            height: 100%;
            overflow-x: hidden;
            overscroll-behavior: none;
        }

        .pwa-app {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 18px 18px calc(84px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f5f5f7;
            overflow-x: hidden;
        }

        .pwa-pages {
            width: min(100%, 520px);
            flex: 1;
            position: relative;
            min-height: 0;
            overflow: hidden;
        }

        .pwa-page {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transform: none;
            transition: opacity 180ms ease;
        }

        .pwa-page.is-active {
            opacity: 1;
            pointer-events: auto;
            transform: none;
            z-index: 2;
        }

        .pwa-editor-page:not(.is-active) {
            transform: none;
        }

        .editor-card {
            height: 100% !important;
            max-height: 100%;
        }

        .pwa-topbar {
            gap: 10px;
            min-height: 64px;
            padding: 14px 16px !important;
        }

        .pwa-topbar-title {
            min-width: 0;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 17px !important;
            line-height: 22px !important;
        }

        .pwa-action-row {
            flex-shrink: 0;
            gap: 8px !important;
        }

        .pwa-action-btn {
            min-height: 34px;
            padding: 0 10px !important;
            border-radius: 10px !important;
            font-size: 13px !important;
            line-height: 1;
            white-space: nowrap;
        }

        .pwa-action-btn svg {
            width: 15px !important;
            height: 15px !important;
            flex-shrink: 0;
        }

        .pwa-action-btn.is-primary {
            padding-left: 12px !important;
            padding-right: 12px !important;
        }

        .pwa-preview-page {
            align-items: center;
            overflow: hidden;
        }

        .preview-card {
            width: 100%;
            max-width: 480px;
            height: 100%;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .pwa-preview-stage {
            width: 100%;
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto;
            overscroll-behavior: contain;
            padding: 22px 0 32px;
            touch-action: pan-y;
        }

        .pwa-preview-stage .phone-shell {
            flex: 0 0 auto;
        }

        .pwa-bottom-nav {
            position: fixed;
            left: 50%;
            bottom: max(12px, env(safe-area-inset-bottom));
            transform: translateX(-50%);
            width: min(calc(100% - 28px), 480px);
            height: 58px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 8px;
            border: 1px solid rgba(17, 24, 39, 0.08);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
            backdrop-filter: blur(18px);
            z-index: 50;
        }

        .pwa-bottom-nav button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border-radius: 12px !important;
            color: #6b7280;
            font-size: 13px;
            font-weight: 600;
            transition: background 160ms ease, color 160ms ease;
        }

        .pwa-bottom-nav button.is-active {
            background: #e9f8ef;
            color: #07c160;
        }

        .pwa-nav-dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: currentColor;
        }

        @media (min-width: 900px) {
            .pwa-app {
                padding-top: 28px;
                padding-bottom: calc(92px + env(safe-area-inset-bottom));
            }
        }

        @media (max-width: 430px) {
            .pwa-app {
                padding: 10px 8px calc(78px + env(safe-area-inset-bottom));
            }

            .pwa-pages {
                width: 100%;
            }

            .pwa-topbar {
                min-height: 58px;
                padding: 11px 14px !important;
                gap: 8px;
            }

            .pwa-topbar-title {
                font-size: 16px !important;
                line-height: 20px !important;
            }

            .pwa-action-row {
                gap: 6px !important;
            }

            .pwa-action-btn {
                min-height: 32px;
                padding-left: 8px !important;
                padding-right: 8px !important;
                font-size: 12px !important;
            }

            .pwa-action-btn.is-primary {
                padding-left: 10px !important;
                padding-right: 10px !important;
            }

            .phone-shell {
                transform: scale(0.88);
                transform-origin: center top;
            }
        }

        @media (max-height: 780px) {
            .pwa-preview-stage {
                align-items: flex-start;
            }

            .phone-shell {
                transform: scale(0.82);
                transform-origin: center top;
            }
        }

        @media (max-width: 430px) and (max-height: 860px) {
            .pwa-preview-stage {
                padding-top: 18px;
            }

            .phone-shell {
                transform: scale(0.78);
                transform-origin: center top;
            }
        }

        @media (max-width: 430px) and (max-height: 780px) {
            .phone-shell {
                transform: scale(0.72);
                transform-origin: center top;
            }
        }
    </style>
</head>
<body>

<div id="app" class="pwa-app">
    <main class="pwa-pages">
    
    <section class="pwa-page pwa-home-page" :class="{ 'is-active': activePage === 'home' }" aria-label="首页">
    <div class="editor-card w-full md:w-[480px] bg-white rounded-xl shadow-lg flex flex-col h-[calc(100vh-4rem)] overflow-hidden">
        <div class="pwa-topbar px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-white z-20 shrink-0">
            <h1 class="pwa-topbar-title text-xl font-bold text-gray-800">首页</h1>
            <div class="pwa-action-row flex gap-2">
                <button @click="resetState" class="pwa-action-btn bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-2 rounded-lg font-medium transition flex items-center gap-1 shadow-sm text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    重置
                </button>
                <button @click="generateImage($event)" class="pwa-action-btn is-primary bg-[#07c160] hover:bg-[#06ad56] text-white px-4 py-2 rounded-lg font-medium transition flex items-center gap-2 shadow-sm text-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    导出截图
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar px-6 py-5 space-y-6 relative">
            <div class="space-y-4 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <div class="flex justify-between items-center border-b border-gray-200 pb-3 mb-1">
                    <h2 class="font-semibold text-gray-700">全局外观</h2>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" v-model="isDarkMode" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-gray-800"></div>
                        <span class="ml-3 text-sm font-medium" :class="isDarkMode ? 'text-gray-800' : 'text-gray-500'">{{ isDarkMode ? '深色模式' : '浅色模式' }}</span>
                    </label>
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">手机时间</label>
                        <input v-model="statusBarTime" type="text" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">左上角返回</label>
                        <input v-model="returnAppText" type="text" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-green-500 outline-none" placeholder="留空隐藏">
                    </div>
                </div>
                <div class="flex gap-4 items-end">
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">聊天标题</label>
                        <input v-model="chatName" type="text" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">未读数</label>
                        <input v-model="unreadCount" type="text" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-green-500 outline-none" placeholder="如: 92">
                    </div>
                </div>
                <div class="flex gap-4 items-end">
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">电池电量</label>
                        <input v-model.number="batteryLevel" type="number" min="0" max="100" step="1" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm text-gray-600 mb-1">网络标识</label>
                        <div class="pwa-select-wrap">
                            <select v-model="networkType" class="pwa-native-select w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-green-500 outline-none">
                                <option value="wifi">WiFi</option>
                                <option value="3G">3G</option>
                                <option value="4G">4G</option>
                                <option value="5G">5G</option>
                            </select>
                            <svg class="pwa-select-chevron" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M8 10l4-4 4 4M16 14l-4 4-4-4" />
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-4 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <div class="flex justify-between items-center">
                    <h2 class="font-semibold text-gray-700">人物设置</h2>
                    <label class="flex items-center gap-2 cursor-pointer text-sm text-gray-700">
                        <input type="checkbox" v-model="showOtherName" class="rounded text-green-600 w-4 h-4"> 显示昵称
                    </label>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">对方昵称</label>
                    <input v-model="otherName" type="text" class="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div class="flex gap-6 mt-2">
                    <div class="flex flex-col items-center gap-2">
                        <span class="text-sm text-gray-600">我的头像</span>
                        <label class="cursor-pointer relative group">
                            <img :src="myAvatar" class="w-16 h-16 rounded-[6px] object-cover border-2 border-gray-200 bg-gray-100">
                            <div class="absolute inset-0 bg-black/40 hidden group-hover:flex items-center justify-center rounded-[6px] text-white text-xs">更换</div>
                            <input type="file" class="hidden" accept="image/*" @change="e => onAvatarChange(e, 'me')">
                        </label>
                    </div>
                    <div class="flex flex-col items-center gap-2">
                        <span class="text-sm text-gray-600">对方头像</span>
                        <label class="cursor-pointer relative group">
                            <img :src="otherAvatar" class="w-16 h-16 rounded-[6px] object-cover border-2 border-gray-200 bg-gray-100">
                            <div class="absolute inset-0 bg-black/40 hidden group-hover:flex items-center justify-center rounded-[6px] text-white text-xs">更换</div>
                            <input type="file" class="hidden" accept="image/*" @change="e => onAvatarChange(e, 'other')">
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </section>

    <section class="pwa-page pwa-editor-page" :class="{ 'is-active': activePage === 'editor' }" aria-label="微信截图编辑器">
    <div class="editor-card w-full md:w-[480px] bg-white rounded-xl shadow-lg flex flex-col h-[calc(100vh-4rem)] overflow-hidden">
        <div class="pwa-topbar px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-white z-20 shrink-0">
            <h1 class="pwa-topbar-title text-xl font-bold text-gray-800">微信截图编辑器</h1>
            <div class="pwa-action-row flex gap-2">
                <button @click="resetState" class="pwa-action-btn bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-2 rounded-lg font-medium transition flex items-center gap-1 shadow-sm text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    重置
                </button>
                <button @click="generateImage($event)" class="pwa-action-btn is-primary bg-[#07c160] hover:bg-[#06ad56] text-white px-4 py-2 rounded-lg font-medium transition flex items-center gap-2 shadow-sm text-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    导出截图
                </button>
            </div>
        </div>

        <div id="edit-panel-scroll" class="flex-1 overflow-y-auto custom-scrollbar px-6 py-5 space-y-6 relative">
            <div class="space-y-4 pb-4">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="font-semibold text-gray-700 flex items-center gap-2">
                        聊天内容编排 
                        <span class="bg-blue-100 text-blue-600 text-[10px] px-2 py-0.5 rounded-full">长按模块可拖拽排序</span>
                    </h2>
                </div>
                
                <transition-group name="msg-list" tag="div" class="space-y-4 relative w-full">
                    <div v-for="(msg, index) in messages" :key="msg.id" 
                         draggable="true" @dragstart="onDragStart($event, index)" @dragover.prevent="onDragOver($event, index)" @dragenter.prevent="onDragEnter(index)" @dragleave.prevent="onDragLeave(index)" @drop="onDrop($event, index)" @dragend="onDragEnd"
                         class="draggable-item bg-gray-50 p-4 rounded-lg border border-gray-200 relative group hover:border-gray-400 w-full"
                         :class="{ 'is-dragging': dragIndex === index, 'drag-over': dragOverIndex === index }">
                        
                        <div class="absolute left-2 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-30 transition cursor-grab text-gray-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                        </div>
                        <button @click.stop="removeMessage(index)" class="absolute -right-2 -top-2 bg-red-500 text-white w-6 h-6 rounded-full opacity-0 group-hover:opacity-100 transition shadow-md flex items-center justify-center text-sm z-10 hover:bg-red-600">×</button>
                        
                        <div class="pl-3">
                            <div v-if="msg.type === 'time' || msg.type === 'nudge'">
                                <label class="block text-xs text-gray-500 mb-1">{{ msg.type === 'time' ? '对话时间' : '系统提示' }}</label>
                                <input v-model="msg.content" type="text" class="w-full px-3 py-1.5 border rounded text-sm text-center focus:ring-2 focus:ring-green-500 outline-none">
                            </div>
                            
                            <div v-if="msg.type === 'text'">
                                <div class="flex justify-between text-xs text-gray-500 mb-1">
                                    <label>文本内容</label>
                                    <label class="flex items-center gap-1 cursor-pointer text-[#27c24c] font-medium" @mousedown.stop><input type="checkbox" v-model="msg.isMe" class="w-[14px] h-[14px]"> 是我发出的</label>
                                </div>
                                <textarea v-model="msg.content" rows="2" class="w-full px-3 py-2 border rounded-md text-sm focus:ring-2 focus:ring-green-500 outline-none resize-none" @mousedown.stop></textarea>
                            </div>
                            
                            <div v-if="msg.type === 'call'">
                                <div class="flex justify-between text-xs text-gray-500 mb-1">
                                    <label class="text-blue-600 font-medium">语音通话</label>
                                    <label class="flex items-center gap-1 cursor-pointer text-[#27c24c] font-medium" @mousedown.stop><input type="checkbox" v-model="msg.isMe" class="w-[14px] h-[14px]"> 是我发出的</label>
                                </div>
                                <input v-model="msg.content" type="text" class="w-full px-3 py-1.5 border rounded text-sm mt-1 focus:ring-2 focus:ring-green-500 outline-none" @mousedown.stop>
                            </div>

                            <div v-if="msg.type === 'image'">
                                <div class="flex justify-between text-xs text-gray-500 mb-1">
                                    <label class="text-indigo-600 font-medium">图片消息</label>
                                    <label class="flex items-center gap-1 cursor-pointer text-[#27c24c] font-medium" @mousedown.stop><input type="checkbox" v-model="msg.isMe" class="w-[14px] h-[14px]"> 是我发出的</label>
                                </div>
                                <div class="mt-2 flex items-center gap-4">
                                    <img :src="msg.imageUrl" class="w-16 h-16 object-cover rounded border border-gray-300">
                                    <label class="bg-indigo-50 border border-indigo-200 hover:bg-indigo-100 text-indigo-600 px-3 py-1.5 rounded cursor-pointer text-sm transition" @mousedown.stop>
                                        点击上传<input type="file" class="hidden" accept="image/*" @change="e => onMsgImageUpload(e, msg)">
                                    </label>
                                </div>
                            </div>

                            <div v-if="msg.type === 'voice'">
                                <div class="flex justify-between text-xs text-gray-500 mb-1">
                                    <label class="text-pink-600 font-medium">语音消息</label>
                                    <label class="flex items-center gap-1 cursor-pointer text-[#27c24c] font-medium" @mousedown.stop><input type="checkbox" v-model="msg.isMe" class="w-[14px] h-[14px]"> 是我发出的</label>
                                </div>
                                <div class="flex gap-2 mt-2 mb-2">
                                    <div class="flex-1">
                                        <label class="block text-xs text-gray-500 mb-1">时长(秒)</label>
                                        <input v-model.number="msg.duration" type="number" min="1" max="60" class="w-full px-3 py-1.5 border rounded text-sm focus:ring-2 focus:ring-green-500 outline-none" @mousedown.stop>
                                    </div>
                                    <div class="flex-1">
                                        <label class="block text-xs text-gray-500 mb-1">状态</label>
                                        <select v-model="msg.status" class="w-full px-3 py-1.5 border rounded text-sm outline-none focus:ring-2 focus:ring-green-500" @mousedown.stop>
                                            <option value="unread">未读</option><option value="read">已读</option><option value="converted">转文字</option>
                                        </select>
                                    </div>
                                </div>
                                <div v-if="msg.status === 'converted'" class="mt-2">
                                    <label class="block text-xs text-gray-500 mb-1">转换文字</label>
                                    <textarea v-model="msg.convertedText" rows="2" class="w-full px-3 py-2 border rounded-md text-sm focus:ring-2 focus:ring-green-500 outline-none resize-none" @mousedown.stop></textarea>
                                </div>
                            </div>

                            <div v-if="msg.type === 'transfer'">
                                <div class="flex justify-between text-xs text-gray-500 mb-1">
                                    <label class="text-orange-600 font-medium">转账</label>
                                    <label class="flex items-center gap-1 cursor-pointer text-[#27c24c] font-medium" @mousedown.stop><input type="checkbox" v-model="msg.isMe" class="w-[14px] h-[14px]"> 是我发出的</label>
                                </div>
                                <div class="mt-2 mb-3">
                                    <label class="block text-xs text-gray-500 mb-1">状态</label>
                                    <select v-model="msg.status" class="w-full px-3 py-1.5 border rounded text-sm outline-none focus:ring-2 focus:ring-green-500" @mousedown.stop>
                                        <option value="pending">待接收</option><option value="accepted">已接收</option>
                                    </select>
                                </div>
                                <div class="flex gap-2">
                                    <div class="flex-1"><label class="block text-xs text-gray-500 mb-1">金额</label><input v-model="msg.amount" type="text" class="w-full px-3 py-1.5 border rounded text-sm outline-none" @mousedown.stop></div>
                                    <div class="flex-1"><label class="block text-xs text-gray-500 mb-1">副标题</label><input v-model="msg.title" type="text" class="w-full px-3 py-1.5 border rounded text-sm outline-none" @mousedown.stop></div>
                                </div>
                                <div class="mt-2"><label class="block text-xs text-gray-500 mb-1">底部小字</label><input v-model="msg.bottomText" type="text" class="w-full px-3 py-1.5 border rounded text-sm outline-none" @mousedown.stop></div>
                            </div>

                            <div v-if="msg.type === 'redPacket'">
                                <div class="flex justify-between text-xs text-gray-500 mb-1">
                                    <label class="text-red-600 font-medium">红包</label>
                                    <label class="flex items-center gap-1 cursor-pointer text-[#27c24c] font-medium" @mousedown.stop><input type="checkbox" v-model="msg.isMe" class="w-[14px] h-[14px]"> 是我发出的</label>
                                </div>
                                <div class="mt-2 mb-3">
                                    <label class="block text-xs text-gray-500 mb-1">状态</label>

</div>

<script>
    const defaultMyAvatar = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%232c3e50"/><circle cx="50" cy="40" r="16" fill="%23fce2c4"/><path d="M 25 100 L 35 65 Q 50 55 65 65 L 75 100" fill="%23fce2c4"/></svg>';
    const defaultOtherAvatar = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23c0392b"/><circle cx="50" cy="50" r="30" fill="%23f1c40f"/><path d="M 35 35 L 45 45 L 35 55 M 65 35 L 55 45 L 65 55" stroke="%23c0392b" stroke-width="4" fill="none"/></svg>';
    const defaultImage = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="%23d8e7d2"/><stop offset="1" stop-color="%23f4d2c2"/></linearGradient></defs><rect width="200" height="250" fill="url(%23g)"/><circle cx="100" cy="88" r="34" fill="%23ffffff" opacity=".72"/><path d="M40 214c9-43 31-67 60-67s51 24 60 67" fill="%23ffffff" opacity=".72"/></svg>';

    // 定义一套初始默认数据，方便重置和初始化
    const defaultState = {
        isDarkMode: false, 
        statusBarTime: '18:43', 
        returnAppText: '', 
        chatName: '塔西', 
        unreadCount: '92', 
        batteryLevel: 65,
        networkType: '5G',
        otherName: '塔西', 
        showOtherName: false, 
        myAvatar: defaultMyAvatar,
        otherAvatar: defaultOtherAvatar,
        messages: [
            { id: 1, type: 'text', isMe: false, content: '欢迎使用' }
        ]
    };

    const { createApp } = Vue;

    createApp({
        data() {
            return {
                // 深拷贝一份默认数据作为初始状态
                ...JSON.parse(JSON.stringify(defaultState)),
                activePage: 'home',
                dragIndex: null,
                dragOverIndex: null
            }
        },
        mounted() {
            // 页面加载时读取本地存储
            this.loadState();
        },
        watch: {
            // 监听数据变化，实现自动保存功能
            isDarkMode: 'saveState',
            statusBarTime: 'saveState',
            returnAppText: 'saveState',
            chatName: 'saveState',
            unreadCount: 'saveState',
            batteryLevel: 'saveState',
            networkType: 'saveState',
            otherName: 'saveState',
            showOtherName: 'saveState',
            myAvatar: 'saveState',
            otherAvatar: 'saveState',
            messages: {
                handler: 'saveState',
                deep: true
            }
        },
        methods: {
            // 保存状态到 localStorage
            saveState() {
                try {
                    const stateToSave = {
                        isDarkMode: this.isDarkMode,
                        statusBarTime: this.statusBarTime,
                        returnAppText: this.returnAppText,
                        chatName: this.chatName,
                        unreadCount: this.unreadCount,
                        batteryLevel: this.batteryLevel,
                        networkType: this.networkType,
                        otherName: this.otherName,
                        showOtherName: this.showOtherName,
                        myAvatar: this.myAvatar,
                        otherAvatar: this.otherAvatar,
                        messages: this.messages
                    };
                    localStorage.setItem('wechat_editor_state_v18', JSON.stringify(stateToSave));
                } catch (e) {
                    console.error('保存状态失败。', e);
                    if (e.name === 'QuotaExceededError') {
                        alert('警告：插入的图片过大，超出了浏览器的本地存储限制（通常为5MB）。本次修改的数据将无法在下次刷新时保留，请尽量压缩图片后再上传。');
                    }
                }
            },
            // 从 localStorage 读取状态
            loadState() {
                const savedState = localStorage.getItem('wechat_editor_state_v18');
                if (savedState) {
                    try {
                        const parsedState = JSON.parse(savedState);
                        Object.assign(this, parsedState);
                    } catch (e) {
                        console.error('加载历史数据失败', e);
                    }
                }
            },
            // 一键重置数据
            resetState() {
                if (confirm('确定要清空所有自定义数据并恢复到默认状态吗？')) {
                    const freshState = JSON.parse(JSON.stringify(defaultState));
                    Object.assign(this, freshState);
                    localStorage.removeItem('wechat_editor_state_v18');
                }
            },
            getTextClass(msg) {
                const theme = this.isDarkMode ? 'dark' : 'light';
                const side = msg.isMe ? 'right' : 'left';
                const shadow = (!this.isDarkMode) ? 'wechat-soft-shadow' : '';
                return `wechat-${theme}-${side} bubble-${side}-${theme} ${shadow}`;
            },
            getTransferClass(msg) {
                const theme = this.isDarkMode ? 'dark' : 'light';
                const side = msg.isMe ? 'right' : 'left';
                const state = msg.status === 'pending' ? 'pending' : 'accepted';
                const shadow = (!this.isDarkMode) ? 'wechat-soft-shadow' : '';
                return `transfer-${state}-${theme} bubble-${side}-orange-${state}-${theme} ${shadow}`;
            },
            getRedPacketClass(msg) {
                const theme = this.isDarkMode ? 'dark' : 'light';
                const side = msg.isMe ? 'right' : 'left';
                const state = msg.status === 'pending' ? 'pending' : 'accepted';
                const shadow = (!this.isDarkMode) ? 'wechat-soft-shadow' : '';
                return `redpacket-${state}-${theme} bubble-${side}-redpacket-${state}-${theme} ${shadow}`;
            },
            getVoiceWidth(sec) {
                if(!sec || sec < 1) sec = 1;
                return Math.min(70 + (sec * 4), 220) + 'px';
            },
            batteryFillWidth() {
                const level = Math.max(0, Math.min(100, Number(this.batteryLevel) || 0));
                return (20.2 * level / 100).toFixed(2);
            },
            getImageBubbleStyle(msg) {
                const naturalWidth = Number(msg.imageWidth);
                const naturalHeight = Number(msg.imageHeight);
                if (!naturalWidth || !naturalHeight) {
                    return { width: '150px', height: '150px' };
                }

                const ratio = naturalWidth / naturalHeight;
                let width;
                let height;

                if (ratio < 0.75) {
                    height = 188;
                    width = Math.round(height * ratio);
                    width = Math.max(84, Math.min(128, width));
                } else if (ratio > 1.25) {
                    width = 160;
                    height = Math.round(width / ratio);
                    height = Math.max(92, Math.min(150, height));
                } else {
                    width = 150;
                    height = Math.round(width / ratio);
                    height = Math.max(120, Math.min(170, height));
                }

                return {
                    width: `${width}px`,
                    height: `${height}px`
                };
            },
            onPreviewImageLoad(event, msg) {
                const img = event.target;
                if (!img?.naturalWidth || !img?.naturalHeight) return;
                if (msg.imageWidth === img.naturalWidth && msg.imageHeight === img.naturalHeight) return;
                msg.imageWidth = img.naturalWidth;
                msg.imageHeight = img.naturalHeight;
            },
            addMessage(type) {
                const baseMsg = { id: Date.now(), type: type, isMe: true };
                if (type === 'text') baseMsg.content = '输入内容...';
                else if (type === 'image') { baseMsg.imageUrl = defaultImage; baseMsg.imageWidth = 200; baseMsg.imageHeight = 250; }
                else if (type === 'voice') { baseMsg.duration = 10; baseMsg.status = 'unread'; baseMsg.convertedText = '转换后的文字...'; }
                else if (type === 'transfer') { baseMsg.amount = '¥1.00'; baseMsg.title = '请收款'; baseMsg.bottomText = '转账'; baseMsg.status = 'pending'; }
                else if (type === 'redPacket') { baseMsg.title = '恭喜发财，大吉大利'; baseMsg.statusText = '已领取'; baseMsg.bottomText = '红包'; baseMsg.status = 'pending'; }
                else if (type === 'call') baseMsg.content = '通话时长 12:34';
                else if (type === 'time') {
                    const now = new Date();
                    baseMsg.content = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                } else if (type === 'nudge') baseMsg.content = '我拍了拍 "对方"';

                this.messages.push(baseMsg);
                this.scrollToBottom();
            },
            removeMessage(index) { this.messages.splice(index, 1); },
            onDragStart(event, index) {
                this.dragIndex = index;
                event.dataTransfer.effectAllowed = 'move';
                event.dataTransfer.setData('text/plain', index);
            },
            onDragEnter(index) { if(this.dragIndex !== index) this.dragOverIndex = index; },
            onDragOver(event, index) { event.preventDefault(); },
            onDragLeave(index) { if(this.dragOverIndex === index) this.dragOverIndex = null; },
            onDrop(event, index) {
                if (this.dragIndex !== null && this.dragIndex !== index) {
                    const draggedItem = this.messages.splice(this.dragIndex, 1)[0];
                    this.messages.splice(index, 0, draggedItem);
                }
                this.dragIndex = null; this.dragOverIndex = null;
            },
            onDragEnd() { this.dragIndex = null; this.dragOverIndex = null; },
            onAvatarChange(event, type) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => { type === 'me' ? this.myAvatar = e.target.result : this.otherAvatar = e.target.result; };
                    reader.readAsDataURL(file);
                }
            },
            onMsgImageUpload(event, msg) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const dataUrl = e.target.result;
                        msg.imageUrl = dataUrl;
                        const image = new Image();
                        image.onload = () => {
                            msg.imageWidth = image.naturalWidth;
                            msg.imageHeight = image.naturalHeight;
                        };
                        image.src = dataUrl;
                    };
                    reader.readAsDataURL(file);
                }
            },
            scrollToBottom() {
                setTimeout(() => {
                    const preview = document.querySelector('#wechat-preview > div:nth-child(3)');
                    if (preview) preview.scrollTop = preview.scrollHeight;
                    const editPanel = document.querySelector('#edit-panel-scroll');
                    if (editPanel) editPanel.scrollTop = editPanel.scrollHeight;
                }, 50);
            },
            downloadImage(dataUrl, fileName) {
                const a = document.createElement('a');
                a.href = dataUrl;
                a.download = fileName;
                a.click();
            },
            async shareOrDownloadImage(dataUrl, fileName) {
                const response = await fetch(dataUrl);
                const blob = await response.blob();
                const file = new File([blob], fileName, { type: 'image/png' });

                if (navigator.canShare?.({ files: [file] })) {
                    try {
                        await navigator.share({
                            files: [file],
                            title: fileName,
                            text: '微信截图'
                        });
                        return;
                    } catch (error) {
                        if (error?.name === 'AbortError') return;
                        console.warn('系统分享失败，改为下载图片。', error);
                    }
                }

                this.downloadImage(dataUrl, fileName);
            },
            async generateImage(event) {
                const node = document.getElementById('wechat-preview');
                const btn = event?.currentTarget;
                if (!node || !btn) return;
                const originalText = btn.innerHTML;
                btn.innerHTML = '正在生成超清截图...';
                
                const bgColor = this.isDarkMode ? '#111111' : '#ededed';
                
                const imageApi = typeof htmlToImage !== 'undefined' ? htmlToImage : (window.htmlToImage || null);
                if (!imageApi?.toPng) {
                    btn.innerHTML = originalText;
                    alert('截图生成组件未加载，请刷新页面后重试');
                    return;
                }

                try {
                    const dataUrl = await imageApi.toPng(node, {
                        pixelRatio: 3,
                        backgroundColor: bgColor,
                        style: { transform: 'scale(1)', transformOrigin: 'top left' }
                    });
                    await this.shareOrDownloadImage(dataUrl, `微信截图_${new Date().getTime()}.png`);
                } catch (error) {
                    console.error('导出失败!', error);
                    alert('截图生成失败，请重试');
                } finally {
                    btn.innerHTML = originalText;
                }
            }
        }
    }).mount('#app');

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(error => {
                console.warn('Service worker 注册失败。', error);
            });
        });
    }
</script>
